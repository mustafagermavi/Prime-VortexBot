name: PrimeVortexBot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Force Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas-ta ccxt requests

      - name: Run Bot
        run: python bot.py
