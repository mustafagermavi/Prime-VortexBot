name: PrimeVortexBot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Force Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas-ta ccxt requests

      - name: 🚀 Run Trading Bot
        run: python bot.py
