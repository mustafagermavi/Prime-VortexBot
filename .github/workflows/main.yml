name: Crypto Signal Bot
on:
  schedule:
    - cron: '*/30 * * * *' # هەر ٣٠ خۆلەکان
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install ccxt requests
      - name: Run bot
        run: python bot.py
