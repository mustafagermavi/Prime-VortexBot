name: PrimeVortexBot

on:
  schedule:
    - cron: '*/15 * * * *' # هەر ١٥ خۆلەکان جارەکێ
  workflow_dispatch: # دا تو بشێی ب دەستێ خۆ ژی "Run" بکەی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install All Libraries (Force)
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas-ta ccxt requests

      - name: 🚀 Run Trading Bot
        run: python bot.py
