name: PrimeVortexAuto

on:
  schedule:
    - cron: '*/15 * * * *' # ئۆتۆماتیکی هەر ١٥ خۆلەکان
  workflow_dispatch: # بۆ تاقیکرنا ب دەست

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install & Run
        run: |
          pip install pandas pandas-ta ccxt requests
          python bot.py
